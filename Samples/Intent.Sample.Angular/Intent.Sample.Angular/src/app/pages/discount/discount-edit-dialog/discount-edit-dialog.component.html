<form #form="ngForm" novalidate (ngSubmit)="onSave(form)">
  <h2 mat-dialog-title>Edit Discount</h2>

  <mat-dialog-content class="dialog-content">
    <ng-container *ngIf="model; else loadingTpl">
      <div class="grid">
        <div class="grid-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Code</mat-label>
            <input
              matInput
              required
              name="code"
              [(ngModel)]="model!.code"
              #codeCtrl="ngModel" />
            <mat-error *ngIf="codeCtrl.invalid && (codeCtrl.touched || form.submitted)">
              Code is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="grid-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Discount amount</mat-label>
            <input
              matInput
              type="number"
              min="0"
              required
              name="discountAmount"
              [(ngModel)]="model!.discountAmount"
              #amountCtrl="ngModel" />
            <mat-error *ngIf="amountCtrl.invalid && (amountCtrl.touched || form.submitted)">
              Discount amount is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="grid-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Expiry date</mat-label>
            <input
              matInput
              [matDatepicker]="expiryPicker"
              required
              name="expiry"
              [(ngModel)]="model!.expiry"
              #expiryCtrl="ngModel" />
            <mat-datepicker-toggle matIconSuffix [for]="expiryPicker"></mat-datepicker-toggle>
            <mat-datepicker #expiryPicker></mat-datepicker>
            <mat-error *ngIf="expiryCtrl.invalid && (expiryCtrl.touched || form.submitted)">
              Expiry date is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="grid-item-wide error-text" *ngIf="serviceErrors.updateDiscountError">
          {{ serviceErrors.updateDiscountError }}
        </div>

        <div class="grid-item-wide error-text" *ngIf="serviceErrors.loadDiscountByIdError">
          {{ serviceErrors.loadDiscountByIdError }}
        </div>
      </div>
    </ng-container>

    <ng-template #loadingTpl>
      <div class="loading-container">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
        <div class="mt-2">Loading discount...</div>
        <div class="error-text mt-2" *ngIf="serviceErrors.loadDiscountByIdError">
          {{ serviceErrors.loadDiscountByIdError }}
        </div>
      </div>
    </ng-template>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">
      Cancel
    </button>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || isLoading || !model">
      <mat-progress-spinner
        *ngIf="isLoading"
        mode="indeterminate"
        diameter="18"
        class="spinner">
      </mat-progress-spinner>
      <span *ngIf="!isLoading">Save</span>
    </button>
  </mat-dialog-actions>
</form>
