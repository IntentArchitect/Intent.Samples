<form #form="ngForm" novalidate (ngSubmit)="onSave(form)">
  <h2 mat-dialog-title>Edit Brand</h2>

  <mat-dialog-content class="dialog-content">
    <ng-container *ngIf="model; else loadingTpl">
      <div class="grid">
        <div class="grid-item">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Name</mat-label>
            <input
              matInput
              required
              name="name"
              [(ngModel)]="model!.name"
              #nameCtrl="ngModel" />
            <mat-error *ngIf="nameCtrl.invalid && (nameCtrl.touched || form.submitted)">
              Name is required
            </mat-error>
          </mat-form-field>
        </div>

        <div class="grid-item-wide error-text" *ngIf="serviceErrors.loadBrandByIdError">
          {{ serviceErrors.loadBrandByIdError }}
        </div>

        <div class="grid-item-wide error-text" *ngIf="serviceErrors.updateBrandError">
          {{ serviceErrors.updateBrandError }}
        </div>
      </div>
    </ng-container>

    <ng-template #loadingTpl>
      <div class="loading-container">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
        <div class="mt-2">Loading brand...</div>
      </div>
    </ng-template>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">
      Cancel
    </button>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      [disabled]="form.invalid || isLoading || !model">
      <mat-progress-spinner
        *ngIf="isLoading"
        mode="indeterminate"
        diameter="18"
        class="spinner">
      </mat-progress-spinner>
      <span *ngIf="!isLoading">Save</span>
    </button>
  </mat-dialog-actions>
</form>
