<h2 mat-dialog-title>Delete order</h2>

<mat-dialog-content class="dialog-content">
  <p>Are you sure you want to delete this order?</p>

  <div *ngIf="serviceErrors.deleteOrderError" class="error-message mt-2">
    {{ serviceErrors.deleteOrderError }}
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()" [disabled]="isLoading">
    Cancel
  </button>

  <button mat-raised-button color="warn" (click)="onConfirm()" [disabled]="isLoading">
    <mat-icon class="mr-1">delete</mat-icon>
    Delete
    <mat-progress-spinner
      *ngIf="isLoading"
      mode="indeterminate"
      diameter="20">
    </mat-progress-spinner>
  </button>
</mat-dialog-actions>
