<div class="pa-4">
  <mat-card class="mb-4 ux-gradient-primary" appearance="outlined">
    <mat-card-content class="pa-4">
      <div class="header-content">
        <div class="title-row">
          <mat-icon class="mr-2">edit</mat-icon>
          <span class="mat-headline-5 text-white font-weight-bold">Edit Title</span>
        </div>
        <div class="subtitle-row text-white opacity-90">
          Update the name for this title.
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="ux-fade-in-up" style="animation-delay: 0.1s">
    <mat-card-header>
      <mat-card-title>Title Details</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <ng-container *ngIf="titleByIdModels; else loadingTpl">
        <form #form="ngForm">
          <div *ngIf="serviceErrors.updateTitleError" class="error-message mb-4">
            {{ serviceErrors.updateTitleError }}
          </div>
          <div *ngIf="serviceErrors.loadTitleByIdError" class="error-message mb-4">
            {{ serviceErrors.loadTitleByIdError }}
          </div>

          <div class="grid">
            <div class="grid-item">
              <mat-form-field appearance="outline" class="w-100">
                <mat-label>Name</mat-label>
                <input
                  matInput
                  name="name"
                  required
                  [(ngModel)]="titleByIdModels!.name"
                  #nameCtrl="ngModel"
                  placeholder="Enter title name"
                />
                <button mat-icon-button matPrefix disabled>
                  <mat-icon>badge</mat-icon>
                </button>
                <mat-error *ngIf="nameCtrl.invalid && nameCtrl.touched">
                  Name is required
                </mat-error>
              </mat-form-field>
            </div>
          </div>

          <div class="button-row mt-2">
            <button
              mat-raised-button
              color="primary"
              type="button"
              (click)="save(form)"
              [disabled]="isLoading || form.invalid || !titleByIdModels"
            >
              <mat-progress-spinner
                *ngIf="isLoading"
                mode="indeterminate"
                diameter="18"
              ></mat-progress-spinner>
              <mat-icon *ngIf="!isLoading" class="mr-1">save</mat-icon>
              <span>{{ isLoading ? 'Saving…' : 'Save' }}</span>
            </button>

            <button
              mat-raised-button
              color="accent"
              type="button"
              (click)="navigateToTitleListPage()"
              [disabled]="isLoading"
            >
              <mat-icon class="mr-1">arrow_back</mat-icon>
              Back to list
            </button>
          </div>
        </form>
      </ng-container>

      <ng-template #loadingTpl>
        <div class="loading-container">
          <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
          <div class="mt-2">Loading title...</div>
        </div>
      </ng-template>
    </mat-card-content>
  </mat-card>
</div>
