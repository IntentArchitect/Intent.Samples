<div class="pa-4">
  <mat-card class="mb-4 ux-gradient-primary" appearance="outlined">
    <mat-card-content class="pa-4">
      <div class="header-content">
        <div class="title-row">
          <mat-icon class="mr-2">badge</mat-icon>
          <span class="mat-headline-5 text-white font-weight-bold">Add Title</span>
        </div>
        <div class="subtitle-row text-white opacity-90">
          Create a new title to use across the application.
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="ux-fade-in-up" style="animation-delay: 0.1s">
    <mat-card-header>
      <mat-card-title>Title Details</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form #form="ngForm" class="title-form">
        <div *ngIf="serviceErrors.createTitleError" class="error-container">
          {{ serviceErrors.createTitleError }}
        </div>

        <div class="grid">
          <div class="grid-item">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Name</mat-label>
              <input
                matInput
                placeholder="Enter title name"
                name="name"
                required
                [(ngModel)]="model.name"
                #nameCtrl="ngModel" />
              <button mat-icon-button matPrefix disabled>
                <mat-icon>badge</mat-icon>
              </button>
              <mat-error *ngIf="nameCtrl.invalid && nameCtrl.touched">
                Name is required
              </mat-error>
            </mat-form-field>
          </div>

          <div class="grid-item-wide actions-row">
            <button
              mat-raised-button
              color="primary"
              type="button"
              class="save-button"
              (click)="save(form)"
              [disabled]="isLoading || form.invalid">
              <mat-progress-spinner
                *ngIf="isLoading"
                mode="indeterminate"
                diameter="18"
                class="spinner">
              </mat-progress-spinner>
              <mat-icon *ngIf="!isLoading" class="mr-1">save</mat-icon>
              <span>{{ isLoading ? 'Saving…' : 'Save' }}</span>
            </button>

            <button
              mat-raised-button
              color="accent"
              type="button"
              (click)="navigateToTitleListPage()"
              [disabled]="isLoading">
              <mat-icon class="mr-1">arrow_back</mat-icon>
              Back to list
            </button>
          </div>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
